<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1101px" preserveAspectRatio="none" style="width:672px;height:1101px;" version="1.1" viewBox="0 0 672 1101" width="672px" zoomAndPan="magnify"><title>RX System Controller &#8212; State Machine</title><defs/><g><g class="title" data-source-line="14"><text fill="#000000" font-family="Inter" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="260.2783" x="198.9294" y="24.5332">RX System Controller &#8212; State Machine</text></g><g id="Boot"><rect fill="#E8F0FE" height="52.7031" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="134.1563" x="383" y="125.6094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="383" x2="517.1563" y1="168.3125" y2="168.3125"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="26.7427" x="393" y="144.1045">Boot</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="114.1563" x="393" y="160.4561">Power-on, serial init</text></g><g id="DisplayInit"><rect fill="#E8F0FE" height="52.7031" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="178.2407" x="361" y="256.6094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="361" x2="539.2407" y1="299.3125" y2="299.3125"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="59.9663" x="371" y="275.1045">DisplayInit</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="158.2407" x="371" y="291.4561">TFT + LVGL + Touch setup</text></g><g id="Waiting"><rect fill="#E8F0FE" height="69.0547" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="110.3081" x="261" y="387.6094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="261" x2="371.3081" y1="446.6641" y2="446.6641"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="90.3081" x="271" y="406.1045">WaitingForData</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="87.4326" x="271" y="422.4561">Idle, waiting for</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="88.8418" x="271" y="438.8076">first CAN frame</text></g><g id="Active"><rect fill="#E8F0FE" height="69.0547" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="168.4971" x="125" y="535.1094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="125" x2="293.4971" y1="594.1641" y2="594.1641"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="35.4009" x="135" y="553.6045">Active</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="99.7153" x="135" y="569.9561">Normal operation</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="148.4971" x="135" y="586.3076">UI updates + relay control</text></g><g id="Degraded"><rect fill="#E8F0FE" height="69.0547" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="125.5107" x="7" y="706.6094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="7" x2="132.5107" y1="765.6641" y2="765.6641"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="57.0972" x="17" y="725.1045">Degraded</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="92.4917" x="17" y="741.4561">1500ms timeout</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="105.5107" x="17" y="757.8076">stale data warning</text></g><g id="Fault"><rect fill="#E8F0FE" height="69.0547" rx="12.5" ry="12.5" style="stroke:#1A73E8;stroke-width:0.5;" width="135.6035" x="362" y="861.6094"/><line style="stroke:#1A73E8;stroke-width:0.5;" x1="362" x2="497.6035" y1="920.6641" y2="920.6641"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="28.9009" x="372" y="880.1045">Fault</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="115.6035" x="372" y="896.4561">Unrecoverable error</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="64.3081" x="372" y="912.8076">red overlay</text></g><ellipse cx="450" cy="54.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="349" cy="1051.1094" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="349" cy="1051.1094" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-entity="GMN2" data-source-line="41" data-uid="ent0003" id="entity_GMN2"><path d="M328,534.6094 L328,565.6094 L293.01,569.6094 L328,573.6094 L328,604.9844 A0,0 0 0 0 328,604.9844 L491.7227,604.9844 A0,0 0 0 0 491.7227,604.9844 L491.7227,544.6094 L481.7227,534.6094 L328,534.6094 A0,0 0 0 0 328,534.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:0.5;"/><path d="M481.7227,534.6094 L481.7227,544.6094 L491.7227,544.6094 L481.7227,534.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:0.5;"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="71.3555" x="334" y="552.0664">Normal state:</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="132.0527" x="334" y="567.1602">- UI updates every frame</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="142.7227" x="334" y="582.2539">- Relays follow turn signals</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="132.7266" x="334" y="597.3477">- HealthMonitor watching</text></g><g class="entity" data-entity="GMN5" data-source-line="48" data-uid="ent0006" id="entity_GMN5"><path d="M168.5,698.6094 L168.5,737.1094 L133.28,741.1094 L168.5,745.1094 L168.5,784.0781 A0,0 0 0 0 168.5,784.0781 L359.4043,784.0781 A0,0 0 0 0 359.4043,784.0781 L359.4043,708.6094 L349.4043,698.6094 L168.5,698.6094 A0,0 0 0 0 168.5,698.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:0.5;"/><path d="M349.4043,698.6094 L349.4043,708.6094 L359.4043,708.6094 L349.4043,698.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:0.5;"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="115.4063" x="174.5" y="716.0664">Graceful degradation:</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="169.9043" x="174.5" y="731.1602">- Yellow "STALE DATA" overlay</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="129.3867" x="174.5" y="746.2539">- UI frozen at last values</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="164.748" x="174.5" y="761.3477">- Outputs disabled (safe mode)</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="158.7305" x="174.5" y="776.4414">- Auto-recovers on next frame</text></g><g class="entity" data-entity="GMN8" data-source-line="56" data-uid="ent0009" id="entity_GMN8"><path d="M413.5,1008.6094 L413.5,1094.0781 L608.3945,1094.0781 L608.3945,1018.6094 L598.3945,1008.6094 L413.5,1008.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:0.5;"/><path d="M598.3945,1008.6094 L598.3945,1018.6094 L608.3945,1018.6094 L598.3945,1008.6094" fill="#FFF3E0" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="79.3594" x="419.5" y="1026.0664">Terminal state:</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="173.8945" x="419.5" y="1041.1602">- Red "SYSTEM FAULT" overlay</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="102.7324" x="419.5" y="1056.2539">- All updates halted</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="152.7305" x="419.5" y="1071.3477">- Requires hardware reset or</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="123.3809" x="426.168" y="1086.4414">power cycle to recover.</text></g><!--link *start* to Boot--><g class="link" data-entity-1=".start." data-entity-2="Boot" data-source-line="16" data-uid="lnk3" id="link_.start._Boot"><path d="M450,64.7694 C450,78.5894 450,99.2794 450,119.3494" fill="none" id="*start*-to-Boot" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="450,125.3494,454,116.3494,450,120.3494,446,116.3494,450,125.3494" style="stroke:#181818;stroke-width:1;"/></g><!--link Boot to DisplayInit--><g class="link" data-entity-1="Boot" data-entity-2="DisplayInit" data-source-line="25" data-uid="lnk4" id="link_Boot_DisplayInit"><path d="M450,178.9094 C450,201.3994 450,227.8694 450,250.3594" fill="none" id="Boot-to-DisplayInit" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="450,256.3594,454,247.3594,450,251.3594,446,247.3594,450,256.3594" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="81.6626" x="451" y="223.1045">boot complete</text></g><!--link DisplayInit to Waiting--><g class="link" data-entity-1="DisplayInit" data-entity-2="Waiting" data-source-line="27" data-uid="lnk5" id="link_DisplayInit_Waiting"><path d="M412.34,309.6194 C400.45,318.4594 387.65,328.8794 377,339.6094 C362.68,354.0394 352.3768,367.0453 341.5568,382.3953" fill="none" id="DisplayInit-to-Waiting" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="338.1,387.2994,346.5547,382.2478,340.9807,383.2126,340.0159,377.6387,338.1,387.2994" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="157.5361" x="378" y="354.1045">display + LVGL + touch OK</text></g><!--link DisplayInit to Fault--><g class="link" data-entity-1="DisplayInit" data-entity-2="Fault" data-source-line="28" data-uid="lnk6" id="link_DisplayInit_Fault"><path d="M506.21,309.7494 C518.83,317.7594 531.11,327.6894 540,339.6094 C562.43,369.6794 562,383.5894 562,421.1094 C562,421.1094 562,421.1094 562,742.1094 C562,792.4494 525.3306,830.8435 488.8806,858.0135" fill="none" id="DisplayInit-to-Fault" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="484.07,861.5994,493.6764,859.4277,488.0788,858.6112,488.8953,853.0136,484.07,861.5994" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="55.6372" x="585.75" y="567.1045">init failure</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="101.1372" x="563" y="583.4561">(lost I2C, SPI fail)</text></g><!--link Waiting to Active--><g class="link" data-entity-1="Waiting" data-entity-2="Active" data-source-line="30" data-uid="lnk7" id="link_Waiting_Active"><path d="M291.18,456.8594 C273.9,480.3594 254.4947,506.7457 237.2347,530.2157" fill="none" id="Waiting-to-Active" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="233.68,535.0494,242.2345,530.1687,236.6422,531.0213,235.7896,525.4291,233.68,535.0494" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="156.0381" x="269" y="501.1045">first ClusterFrame received</text></g><!--link Active to Degraded--><g class="link" data-entity-1="Active" data-entity-2="Degraded" data-source-line="32" data-uid="lnk8" id="link_Active_Degraded"><path d="M124.62,583.8694 C95.03,593.0194 64.77,608.4794 47,634.6094 C32.66,655.6894 37.5545,678.693 47.6345,700.733" fill="none" id="Active-to-Degraded" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="50.13,70